<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiFlex Browser</title>
    <!-- Google Fonts for premium look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for sleek icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="browser">
        <!-- TAB BAR -->
        <div id="tabsContainer">
            <div id="tabsList"></div>
            <button id="newTabBtn" title="New Tab">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <!-- TOOLBAR / NAVIGATION -->
        <div class="toolbar">
            <div class="nav-group">
                <button id="backBtn" title="Go Back">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <button id="forwardBtn" title="Go Forward">
                    <i class="fas fa-arrow-right"></i>
                </button>
                <button id="reloadBtn" title="Reload Page">
                    <i class="fas fa-redo"></i>
                </button>
                <button id="homeBtn" title="Go to Homepage">
                    <i class="fas fa-home"></i>
                </button>
            </div>

            <!-- Address Bar -->
            <input type="text" id="urlBar" placeholder="Search with DuckDuckGo or enter URL..." autocomplete="off">

            <div class="nav-group">
                <button id="settingsBtn" title="Settings">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </div>

        <!-- PAGE / WEBVIEW VIEWPORTS -->
        <div class="webview-container" id="pagesContainer">
            <!-- Dynamic tabs content will be loaded here -->
        </div>
    </div>

    <!-- SETTINGS PANEL -->
    <div id="settingsPanel">
        <div class="settings-header">
            <h2>Settings</h2>
            <button id="closeSettings" title="Close Settings">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="settings-content">
            <!-- Homepage Settings -->
            <div class="setting-group">
                <label>Homepage Background</label>
                <div class="bg-upload-area" id="bgUploadBtn">
                    <i class="fas fa-image"></i>
                    <span>Click to set custom image</span>
                    <input type="file" id="bgImageInput" accept="image/*" style="display: none;">
                </div>
                <button id="resetBgBtn" class="secondary-btn">Reset Background</button>
            </div>

            <!-- Default Search Engine -->
            <div class="setting-group">
                <label for="searchEngineSelect">Default Search Engine</label>
                <select id="searchEngineSelect">
                    <!-- Loaded dynamically -->
                </select>
            </div>

            <!-- Theme Settings -->
            <div class="setting-group">
                <label for="themeSelect">Theme Mode</label>
                <select id="themeSelect">
                    <option value="light">Light Mode</option>
                    <option value="dark">Dark Mode</option>
                </select>
            </div>

            <!-- System Info -->
            <div class="settings-about">
                <h3>About PiFlex</h3>
                <p>Version 1.1.0 (Raspberry Pi 3 Edition)</p>
                <p>RAM status: Optimized (~120MB Idle)</p>
            </div>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="js/settings.js"></script>
    <script src="js/browser.js"></script>
    <script src="js/tabs.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
