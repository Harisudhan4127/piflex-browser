<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D9E75" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
    <linearGradient id="berryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>
  </defs>
  
  <!-- Outer Glow Ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#globeGrad)" stroke-width="2" opacity="0.4" />
  
  <!-- Main Globe Base -->
  <circle cx="50" cy="50" r="38" fill="url(#globeGrad)" />
  
  <!-- Grid Lines (Latitude/Longitude) representing Web/Browser -->
  <path d="M 12 50 H 88" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.7" />
  <path d="M 50 12 V 88" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.7" />
  <path d="M 20 28 A 38 38 0 0 0 80 28" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5" />
  <path d="M 20 72 A 38 38 0 0 1 80 72" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5" />
  <path d="M 35 15 A 38 38 0 0 0 35 85" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5" />
  <path d="M 65 15 A 38 38 0 0 1 65 85" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5" />
  
  <!-- Raspberry Core (Branding embedded) -->
  <g transform="translate(36, 36) scale(0.28)">
    <!-- Leaves -->
    <path d="M 25 15 C 20 5, 30 0, 50 10 C 70 0, 80 5, 75 15 C 70 25, 60 20, 50 25 C 40 20, 30 25, 25 15 Z" fill="url(#leafGrad)" />
    <!-- Raspberry Drupelets -->
    <circle cx="35" cy="40" r="12" fill="url(#berryGrad)" />
    <circle cx="65" cy="40" r="12" fill="url(#berryGrad)" />
    <circle cx="50" cy="48" r="13" fill="url(#berryGrad)" />
    <circle cx="35" cy="62" r="12" fill="url(#berryGrad)" />
    <circle cx="65" cy="62" r="12" fill="url(#berryGrad)" />
    <circle cx="50" cy="72" r="13" fill="url(#berryGrad)" />
    <circle cx="50" cy="90" r="11" fill="url(#berryGrad)" />
  </g>
</svg>
